<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting Eligibility Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vote.css">
</head>

<body>
    <a href="../../index.html" class="back-btn">← Back to Home</a>
    <div class="container">
        <h1>🗳️ Vote Validator</h1>
        
        <div class="input-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" placeholder="Enter your name" value="Arun">
        </div>

        <div class="input-group">
            <label for="age">Current Age</label>
            <input type="number" id="age" placeholder="18" value="17">
        </div>

        <button onclick="vote()" class="calculate-btn">Check Eligibility</button>
        
        <div id="res">Result will be displayed here</div>
    </div>
    <script src="../vote.js"></script>
</body>

</html>
